<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>网络安全管理员三级 · 题库练习平台</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Microsoft YaHei","PingFang SC",sans-serif}
body{background:linear-gradient(135deg,#0f172a 0%,#1e293b 50%,#0f172a 100%);min-height:100vh;color:#fff;padding:20px}
.container{max-width:1000px;margin:0 auto}

/* 头部 */
.header{text-align:center;padding:30px 0 24px}
.header h1{font-size:28px;background:linear-gradient(90deg,#38bdf8,#818cf8,#c084fc);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px;font-weight:700}
.header p{color:#94a3b8;font-size:14px}

/* 视图切换 */
.view{display:none}
.view.active{display:block;animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* 首页卡片 */
.tab-nav{display:flex;gap:10px;justify-content:center;margin-bottom:28px;flex-wrap:wrap}
.tab-btn{padding:12px 26px;background:rgba(30,41,59,.8);border:1px solid rgba(148,163,184,.2);color:#cbd5e1;border-radius:10px;font-size:15px;font-weight:500;cursor:pointer;transition:all .25s}
.tab-btn:hover{border-color:rgba(56,189,248,.5);color:#fff;transform:translateY(-2px)}
.tab-btn.active{background:linear-gradient(135deg,#0ea5e9,#6366f1);border-color:transparent;color:#fff;box-shadow:0 4px 16px rgba(14,165,233,.4)}
.tab-btn .count{display:inline-block;background:rgba(255,255,255,.2);padding:2px 8px;border-radius:10px;font-size:12px;margin-left:6px}

.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px}
.card{background:rgba(30,41,59,.6);border:1px solid rgba(148,163,184,.15);border-radius:14px;padding:22px;cursor:pointer;transition:all .3s;position:relative;overflow:hidden;backdrop-filter:blur(10px)}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#38bdf8,#818cf8);transform:scaleX(0);transition:transform .3s}
.card:hover{transform:translateY(-4px);border-color:rgba(56,189,248,.4);box-shadow:0 10px 30px rgba(0,0,0,.3)}
.card:hover::before{transform:scaleX(1)}
.card.single::before{background:linear-gradient(90deg,#0ea5e9,#38bdf8)}
.card.multi::before{background:linear-gradient(90deg,#6366f1,#818cf8)}
.card.judge::before{background:linear-gradient(90deg,#a855f7,#c084fc)}
.card h3{font-size:19px;margin-bottom:8px;color:#f1f5f9;font-weight:600}
.card .sub{color:#94a3b8;font-size:13px;margin-bottom:16px;line-height:1.5}
.card .meta{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}
.card .tag{padding:4px 10px;background:rgba(148,163,184,.1);border-radius:6px;font-size:12px;color:#94a3b8}
.card .progress-info{font-size:12px;color:#64748b;margin-top:8px}
.card .enter{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:11px;background:linear-gradient(135deg,#0ea5e9,#6366f1);border:none;border-radius:8px;color:#fff;font-size:15px;font-weight:500;cursor:pointer;transition:all .25s}
.card .enter:hover{box-shadow:0 4px 14px rgba(14,165,233,.5);transform:scale(1.02)}

/* 错题本入口 */
.wrongbook-btn{position:fixed;top:20px;right:20px;padding:10px 18px;background:linear-gradient(135deg,#ef4444,#f97316);border:none;border-radius:10px;color:#fff;font-size:14px;font-weight:500;cursor:pointer;box-shadow:0 4px 16px rgba(239,68,68,.4);z-index:100;transition:all .25s}
.wrongbook-btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(239,68,68,.5)}
.wrongbook-btn .badge{display:inline-block;background:#fff;color:#ef4444;padding:1px 7px;border-radius:10px;font-size:12px;font-weight:700;margin-left:4px;min-width:20px}

/* 答题页 */
.quiz-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px}
.back-btn{padding:9px 18px;background:rgba(30,41,59,.8);border:1px solid rgba(148,163,184,.2);color:#cbd5e1;border-radius:8px;font-size:14px;cursor:pointer;transition:all .25s}
.back-btn:hover{border-color:rgba(56,189,248,.5);color:#fff}
.quiz-title{font-size:20px;font-weight:600;color:#f1f5f9}
.quiz-stats{font-size:13px;color:#94a3b8}
.quiz-stats span{margin:0 8px}
.quiz-stats .correct-n{color:#34d399}
.quiz-stats .wrong-n{color:#f87171}

/* 进度条 */
.progress-bar{height:6px;background:rgba(148,163,184,.15);border-radius:3px;margin-bottom:24px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#38bdf8,#818cf8);border-radius:3px;transition:width .3s}

/* 题目卡片 */
.question-card{background:rgba(30,41,59,.6);border:1px solid rgba(148,163,184,.15);border-radius:14px;padding:24px;margin-bottom:18px;backdrop-filter:blur(10px)}
.q-meta{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.q-num{display:inline-flex;align-items:center;justify-content:center;width:32px;height:32px;background:linear-gradient(135deg,#0ea5e9,#6366f1);border-radius:8px;font-size:14px;font-weight:600}
.q-type{padding:3px 10px;border-radius:6px;font-size:12px;font-weight:500}
.q-type.single{background:rgba(14,165,233,.2);color:#38bdf8}
.q-type.multi{background:rgba(99,102,241,.2);color:#818cf8}
.q-type.judge{background:rgba(168,85,247,.2);color:#c084fc}
.q-stem{font-size:17px;line-height:1.7;color:#f1f5f9;margin-bottom:18px}

/* 选项 */
.options{display:flex;flex-direction:column;gap:10px}
.opt{display:flex;align-items:flex-start;gap:12px;padding:13px 16px;background:rgba(15,23,42,.5);border:1px solid rgba(148,163,184,.15);border-radius:10px;cursor:pointer;transition:all .2s;user-select:none}
.opt:hover{border-color:rgba(56,189,248,.3);background:rgba(15,23,42,.7)}
.opt.selected{border-color:#38bdf8;background:rgba(56,189,248,.1)}
.opt.correct{border-color:#34d399;background:rgba(52,211,153,.12)}
.opt.wrong{border-color:#f87171;background:rgba(248,113,113,.12)}
.opt.disabled{cursor:default}
.opt-marker{display:inline-flex;align-items:center;justify-content:center;min-width:28px;height:28px;border:2px solid rgba(148,163,184,.3);border-radius:50%;font-size:13px;font-weight:600;color:#94a3b8;flex-shrink:0;transition:all .2s}
.opt.selected .opt-marker{border-color:#38bdf8;background:#38bdf8;color:#fff}
.opt.correct .opt-marker{border-color:#34d399;background:#34d399;color:#fff}
.opt.wrong .opt-marker{border-color:#f87171;background:#f87171;color:#fff}
.opt-text{flex:1;line-height:1.6;font-size:15px;color:#e2e8f0;padding-top:3px}

/* 反馈区 */
.feedback{margin-top:16px;padding:14px 16px;border-radius:10px;font-size:14px;display:none;line-height:1.6}
.feedback.show{display:block;animation:fadeIn .25s ease}
.feedback.correct{background:rgba(52,211,153,.1);border:1px solid rgba(52,211,153,.3);color:#6ee7b7}
.feedback.wrong{background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.3);color:#fca5a5}
.feedback .ans-label{font-weight:600;margin-bottom:4px}

/* 多选确认按钮 */
.confirm-btn{margin-top:14px;padding:11px 24px;background:linear-gradient(135deg,#6366f1,#818cf8);border:none;border-radius:8px;color:#fff;font-size:15px;font-weight:500;cursor:pointer;transition:all .25s;display:none}
.confirm-btn.show{display:inline-block}
.confirm-btn:hover{box-shadow:0 4px 14px rgba(99,102,241,.5);transform:scale(1.03)}
.confirm-btn:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none}

/* 导航按钮 */
.nav-btns{display:flex;justify-content:space-between;margin-top:24px;gap:12px}
.nav-btn{padding:11px 28px;background:rgba(30,41,59,.8);border:1px solid rgba(148,163,184,.2);color:#cbd5e1;border-radius:8px;font-size:14px;cursor:pointer;transition:all .25s}
.nav-btn:hover:not(:disabled){border-color:rgba(56,189,248,.5);color:#fff}
.nav-btn:disabled{opacity:.35;cursor:not-allowed}
.nav-btn.primary{background:linear-gradient(135deg,#0ea5e9,#6366f1);border-color:transparent;color:#fff}

/* 结果页 */
.result-card{background:rgba(30,41,59,.6);border:1px solid rgba(148,163,184,.15);border-radius:16px;padding:36px;text-align:center;margin-top:20px}
.result-score{font-size:48px;font-weight:700;margin:16px 0}
.result-score .big{background:linear-gradient(90deg,#38bdf8,#818cf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.result-detail{display:flex;justify-content:center;gap:30px;margin:20px 0;flex-wrap:wrap}
.result-stat{text-align:center}
.result-stat .num{font-size:28px;font-weight:600;margin-bottom:4px}
.result-stat .label{font-size:13px;color:#94a3b8}
.result-stat.correct .num{color:#34d399}
.result-stat.wrong .num{color:#f87171}
.result-stat.skip .num{color:#94a3b8}
.result-actions{display:flex;justify-content:center;gap:12px;margin-top:24px;flex-wrap:wrap}
.result-actions button{padding:11px 24px;border-radius:8px;font-size:14px;cursor:pointer;border:none;font-weight:500;transition:all .25s}
.result-actions .retry{background:linear-gradient(135deg,#0ea5e9,#6366f1);color:#fff}
.result-actions .retry:hover{box-shadow:0 4px 14px rgba(14,165,233,.5)}
.result-actions .wrong-only{background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.4);color:#f87171}
.result-actions .wrong-only:hover{background:rgba(239,68,68,.25)}
.result-actions .back-home{background:rgba(148,163,184,.15);border:1px solid rgba(148,163,184,.3);color:#cbd5e1}
.result-actions .back-home:hover{color:#fff}

/* 空状态 */
.empty{text-align:center;padding:60px 20px;color:#64748b}
.empty .icon{font-size:48px;margin-bottom:16px}
.empty p{font-size:15px;margin-bottom:20px}

.footer{text-align:center;padding:30px 0 16px;color:#475569;font-size:13px}

@media(max-width:768px){
.header h1{font-size:22px}
.cards{grid-template-columns:1fr}
.q-stem{font-size:15px}
.result-score{font-size:36px}
}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>🛡️ 网络安全管理员三级 · 题库练习平台</h1>
    <p>即时反馈 · 错题本 · 990 题全套练习</p>
  </div>

  <!-- 首页 -->
  <div class="view active" id="view-home">
    <div class="tab-nav" id="tabNav"></div>
    <div class="cards" id="cardsGrid"></div>
  </div>

  <!-- 答题页 -->
  <div class="view" id="view-quiz">
    <div class="quiz-header">
      <button class="back-btn" onclick="backHome()">← 返回</button>
      <div class="quiz-title" id="quizTitle"></div>
      <div class="quiz-stats" id="quizStats"></div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    <div id="quizBody"></div>
    <div class="nav-btns" id="navBtns" style="display:none">
      <button class="nav-btn" id="prevBtn" onclick="prevQ()">上一题</button>
      <button class="nav-btn primary" id="nextBtn" onclick="nextQ()">下一题</button>
    </div>
  </div>

  <!-- 结果页 -->
  <div class="view" id="view-result">
    <div class="result-card" id="resultCard"></div>
  </div>

  <div class="footer">
    <p>共 9 套题库 · 990 题 · 答案已内置 · 支持离线使用</p>
  </div>
</div>

<button class="wrongbook-btn" onclick="openWrongBook()">📚 错题本<span class="badge" id="wrongBadge">0</span></button>

<script>
// ===== 题库数据 =====

const PAPERS_META = [{"key":"single_a","title":"单选题练习 A 卷","qtype":"single","count":110},{"key":"single_b","title":"单选题练习 B 卷","qtype":"single","count":110},{"key":"single_c","title":"单选题练习 C 卷","qtype":"single","count":110},{"key":"multi_a","title":"多选题练习 A 卷","qtype":"multi","count":110},{"key":"multi_b","title":"多选题练习 B 卷","qtype":"multi","count":110},{"key":"multi_c","title":"多选题练习 C 卷","qtype":"multi","count":110},{"key":"judge_a","title":"判断题练习 A 卷","qtype":"judge","count":110},{"key":"judge_b","title":"判断题练习 B 卷","qtype":"judge","count":110},{"key":"judge_c","title":"判断题练习 C 卷","qtype":"judge","count":110}];

// ===== 状态 =====
let currentPaper = null;      // 当前试卷的题目数组
let currentPaperTitle = "";   // 当前试卷标题
let currentIdx = 0;           // 当前题目索引
let answers = {};             // {idx: {selected: [...], correct: bool}}
let isWrongBookMode = false;  // 是否错题本模式

// ===== localStorage 错题本 =====
const WB_KEY = 'wjx_wrongbook_v1';
function loadWrongBook(){ try{return JSON.parse(localStorage.getItem(WB_KEY)||'{}')}catch(e){return {}} }
function saveWrongBook(wb){ localStorage.setItem(WB_KEY, JSON.stringify(wb)) }
function wrongCount(){
  const wb = loadWrongBook();
  return Object.keys(wb).length;
}
// 错题 key = paperKey + '_' + 题目在试卷中的索引
function qKey(paperKey, idx){ return paperKey + '_' + idx }
function addWrong(paperKey, idx, qData){
  const wb = loadWrongBook();
  wb[qKey(paperKey, idx)] = {paperKey, idx, stem:qData.stem, options:qData.options, answer:qData.answer, type:qData.type, ts:Date.now()};
  saveWrongBook(wb);
  updateBadge();
}
function removeWrong(paperKey, idx){
  const wb = loadWrongBook();
  delete wb[qKey(paperKey, idx)];
  saveWrongBook(wb);
  updateBadge();
}
function updateBadge(){
  document.getElementById('wrongBadge').textContent = wrongCount();
}

// ===== 首页渲染 =====
function renderHome(){
  // Tab
  const tabs = [
    {key:'single', label:'单选题'},
    {key:'multi', label:'多选题'},
    {key:'judge', label:'判断题'},
  ];
  const tabNav = document.getElementById('tabNav');
  tabNav.innerHTML = tabs.map(t=>{
    const cnt = PAPERS_META.filter(p=>p.qtype===t.key).length;
    return `<button class="tab-btn active" data-tab="${t.key}" onclick="filterTab('${t.key}')">${t.label}<span class="count">${cnt}套</span></button>`;
  }).join('');

  filterTab('single');
}

function filterTab(qtype){
  document.querySelectorAll('.tab-btn').forEach(b=>{
    b.classList.toggle('active', b.dataset.tab===qtype);
  });
  const grid = document.getElementById('cardsGrid');
  const wb = loadWrongBook();
  const filtered = PAPERS_META.filter(p=>p.qtype===qtype);
  grid.innerHTML = filtered.map(p=>{
    // 该卷错题数
    const wrongInPaper = Object.values(wb).filter(w=>w.paperKey===p.key).length;
    const typeLabel = {single:'单选',multi:'多选',judge:'判断'}[p.qtype];
    const levelLabel = {0:'基础',1:'进阶',2:'冲刺'}[p.title.includes('A')?0:p.title.includes('B')?1:2];
    return `<div class="card ${p.qtype}" onclick="startQuiz('${p.key}', false)">
      <h3>${p.title}</h3>
      <p class="sub">网络安全管理员三级 · ${typeLabel}专项练习</p>
      <div class="meta">
        <span class="tag">${typeLabel}</span>
        <span class="tag">${levelLabel}</span>
        <span class="tag">${p.count}题</span>
      </div>
      ${wrongInPaper>0 ? `<div class="progress-info">⚠️ 本卷错题 ${wrongInPaper} 题</div>` : ''}
      <div class="enter">开始做题 →</div>
    </div>`;
  }).join('');
}

// ===== 开始答题 =====
function startQuiz(paperKey, wrongOnly){
  isWrongBookMode = false;
  const paper = PAPERS.find(p=>p.paper_key===paperKey);
  if(!paper) return;

  if(wrongOnly){
    // 只练错题
    const wb = loadWrongBook();
    const wrongIdxs = Object.values(wb).filter(w=>w.paperKey===paperKey).map(w=>w.idx).sort((a,b)=>a-b);
    if(wrongIdxs.length===0){
      alert('本卷暂无错题！');
      return;
    }
    currentPaper = wrongIdxs.map(i=>paper.questions[i]).map((q,ni)=>({...q, _origIdx: wrongIdxs[ni]}));
    currentPaperTitle = paper.title + ' · 错题练习';
  } else {
    currentPaper = paper.questions.map((q,i)=>({...q, _origIdx:i}));
    currentPaperTitle = paper.title;
  }

  currentPaperKey = paperKey;
  currentIdx = 0;
  answers = {};
  showView('view-quiz');
  document.getElementById('quizTitle').textContent = currentPaperTitle;
  renderQuestion();
}

let currentPaperKey = null;

// ===== 渲染当前题目 =====
function renderQuestion(){
  const q = currentPaper[currentIdx];
  const total = currentPaper.length;
  const ans = answers[currentIdx];

  // 进度
  const answered = Object.keys(answers).length;
  document.getElementById('progressFill').style.width = (answered/total*100) + '%';
  document.getElementById('quizStats').innerHTML =
    `<span>第 <b style="color:#fff">${currentIdx+1}</b>/${total} 题</span>` +
    `<span class="correct-n">✓ ${Object.values(answers).filter(a=>a.correct).length}</span>` +
    `<span class="wrong-n">✗ ${Object.values(answers).filter(a=>a.correct===false).length}</span>`;

  // 判断题在问卷星里 type=single，但选项是"对"/"错"，需特殊处理
  const isJudge = q.options.length === 2 && q.options.some(o => o.letter === '对' || o.letter === '错');
  const typeLabel = isJudge ? '判断题' : ({single:'单选题',multi:'多选题',judge:'判断题'}[q.type] || '单选题');
  const typeClass = isJudge ? 'judge' : q.type;

  let optsHtml = '';
  q.options.forEach((o, oi)=>{
    let cls = 'opt';
    if(ans){
      cls += ' disabled';
      const selected = ans.selected.includes(o.letter);
      const isCorrect = q.answer.includes(o.letter);
      if(selected && isCorrect) cls += ' correct';
      else if(selected && !isCorrect) cls += ' wrong';
      else if(!selected && isCorrect) cls += ' correct';
    }
    optsHtml += `<div class="${cls}" data-oi="${oi}" data-letter="${o.letter}" onclick="selectOpt(${oi})">
      <span class="opt-marker">${o.letter}</span>
      <span class="opt-text">${o.text}</span>
    </div>`;
  });

  // 反馈
  let feedbackHtml = '';
  if(ans){
    const isCorrect = ans.correct;
    const ansText = q.answer.split('').map(l=>{
      const opt = q.options.find(o=>o.letter===l);
      return opt ? `${l}. ${opt.text}` : l;
    }).join('；');
    feedbackHtml = `<div class="feedback show ${isCorrect?'correct':'wrong'}">
      <div class="ans-label">${isCorrect?'✅ 回答正确':'❌ 回答错误'}</div>
      ${!isCorrect ? `<div>正确答案：${ansText}</div>` : ''}
    </div>`;
  }

  // 多选确认按钮
  const isMulti = q.type === 'multi';
  const confirmBtn = isMulti && !ans ? `<button class="confirm-btn show" id="confirmBtn" onclick="confirmMulti()" disabled>确认答案</button>` : '';

  document.getElementById('quizBody').innerHTML = `
    <div class="question-card">
      <div class="q-meta">
        <span class="q-num">${currentIdx+1}</span>
        <span class="q-type ${typeClass}">${typeLabel}</span>
      </div>
      <div class="q-stem">${q.stem}</div>
      <div class="options">${optsHtml}</div>
      ${feedbackHtml}
      ${confirmBtn}
    </div>`;

  // 导航按钮
  const nav = document.getElementById('navBtns');
  nav.style.display = 'flex';
  document.getElementById('prevBtn').disabled = currentIdx === 0;
  const nextBtn = document.getElementById('nextBtn');
  if(currentIdx === total - 1){
    nextBtn.textContent = '查看结果 →';
  } else {
    nextBtn.textContent = '下一题 →';
  }
}

// ===== 选择选项 =====
function selectOpt(oi){
  const q = currentPaper[currentIdx];
  const ans = answers[currentIdx];
  if(ans) return; // 已答过，锁定

  if(q.type === 'multi'){
    // 多选：切换选中状态
    const el = document.querySelector(`.opt[data-oi="${oi}"]`);
    el.classList.toggle('selected');
    // 检查是否有选中
    const selected = Array.from(document.querySelectorAll('.opt.selected')).map(e=>e.dataset.letter);
    document.getElementById('confirmBtn').disabled = selected.length < 2;
  } else {
    // 单选/判断：直接判定
    const letter = q.options[oi].letter;
    const selected = [letter];
    judge(selected);
  }
}

function confirmMulti(){
  const q = currentPaper[currentIdx];
  const selected = Array.from(document.querySelectorAll('.opt.selected')).map(e=>e.dataset.letter);
  if(selected.length < 2) return;
  judge(selected);
}

function judge(selected){
  const q = currentPaper[currentIdx];
  const correctSet = q.answer.split('').sort().join('');
  const selSet = [...selected].sort().join('');
  const isCorrect = correctSet === selSet;
  answers[currentIdx] = {selected, correct: isCorrect};

  // 错题加入错题本
  if(!isCorrect){
    addWrong(currentPaperKey, q._origIdx, q);
  } else {
    // 答对了，从错题本移除（如果之前错过）
    removeWrong(currentPaperKey, q._origIdx);
  }

  renderQuestion();
}

// ===== 导航 =====
function prevQ(){
  if(currentIdx > 0){ currentIdx--; renderQuestion(); }
}
function nextQ(){
  if(currentIdx < currentPaper.length - 1){
    currentIdx++;
    renderQuestion();
  } else {
    showResult();
  }
}

// ===== 结果页 =====
function showResult(){
  const total = currentPaper.length;
  const correct = Object.values(answers).filter(a=>a.correct).length;
  const wrong = Object.values(answers).filter(a=>a.correct===false).length;
  const skip = total - correct - wrong;
  const score = Math.round(correct/total*100);

  document.getElementById('resultCard').innerHTML = `
    <div style="font-size:16px;color:#94a3b8">练习完成</div>
    <div class="result-score"><span class="big">${score}</span><span style="font-size:24px;color:#94a3b8">分</span></div>
    <div class="result-detail">
      <div class="result-stat correct"><div class="num">${correct}</div><div class="label">答对</div></div>
      <div class="result-stat wrong"><div class="num">${wrong}</div><div class="label">答错</div></div>
      <div class="result-stat skip"><div class="num">${skip}</div><div class="label">未答</div></div>
    </div>
    <div class="result-actions">
      <button class="retry" onclick="startQuiz('${currentPaperKey}', false)">重新练习</button>
      <button class="wrong-only" onclick="startQuiz('${currentPaperKey}', true)">只练错题 (${wrong})</button>
      <button class="back-home" onclick="backHome()">返回首页</button>
    </div>`;

  showView('view-result');
}

// ===== 错题本 =====
function openWrongBook(){
  const wb = loadWrongBook();
  const keys = Object.keys(wb);
  if(keys.length === 0){
    document.getElementById('resultCard').innerHTML = `
      <div class="empty">
        <div class="icon">📚</div>
        <p>错题本还是空的，加油练习吧！</p>
        <button class="nav-btn primary" onclick="backHome()" style="padding:10px 24px">返回首页</button>
      </div>`;
    showView('view-result');
    return;
  }

  // 按试卷分组
  const byPaper = {};
  keys.forEach(k=>{
    const w = wb[k];
    if(!byPaper[w.paperKey]) byPaper[w.paperKey] = [];
    byPaper[w.paperKey].push(w);
  });

  let html = `<div style="margin-bottom:20px">
    <button class="back-btn" onclick="backHome()" style="margin-bottom:16px">← 返回首页</button>
    <h2 style="font-size:22px;margin-bottom:8px">📚 错题本</h2>
    <p style="color:#94a3b8;font-size:14px;margin-bottom:20px">共 ${keys.length} 道错题，答对后会自动移出错题本</p>
  </div>`;

  Object.entries(byPaper).forEach(([pk, items])=>{
    const paper = PAPERS.find(p=>p.paper_key===pk);
    const title = paper ? paper.title : pk;
    html += `<div style="margin-bottom:24px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
        <h3 style="font-size:17px;color:#f1f5f9">${title}</h3>
        <button class="nav-btn primary" onclick="startQuiz('${pk}', true)" style="padding:8px 18px;font-size:13px">练习本卷错题 (${items.length})</button>
      </div>`;
    items.sort((a,b)=>a.idx-b.idx).forEach(w=>{
      const ansText = w.answer.split('').map(l=>{
        const opt = w.options.find(o=>o.letter===l);
        return opt ? `${l}. ${opt.text}` : l;
      }).join('；');
      html += `<div class="question-card" style="margin-bottom:12px">
        <div class="q-meta">
          <span class="q-num" style="background:linear-gradient(135deg,#ef4444,#f97316)">${w.idx+1}</span>
          <span class="q-type ${w.type}">${{single:'单选',multi:'多选',judge:'判断'}[w.type]||'单选'}</span>
        </div>
        <div class="q-stem" style="font-size:15px">${w.stem}</div>
        <div class="feedback show correct" style="margin-top:10px">
          <div class="ans-label">正确答案</div>
          <div>${ansText}</div>
        </div>
      </div>`;
    });
    html += `</div>`;
  });

  html += `<div style="text-align:center;margin-top:20px">
    <button onclick="clearWrongBook()" style="padding:10px 24px;background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.4);color:#f87171;border-radius:8px;cursor:pointer;font-size:14px">清空错题本</button>
  </div>`;

  document.getElementById('resultCard').innerHTML = html;
  showView('view-result');
}

function clearWrongBook(){
  if(confirm('确定要清空全部错题吗？此操作不可撤销。')){
    localStorage.removeItem(WB_KEY);
    updateBadge();
    openWrongBook();
  }
}

// ===== 视图切换 =====
function showView(id){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}
function backHome(){
  showView('view-home');
  renderHome();
}

// ===== 初始化 =====
updateBadge();
renderHome();
</script>
</body>
</html>
